# Config using a compound range specifier (>=1.0,<3.0).
# Used to verify that compound ranges collapse to an exact == pin, and that --operator overrides work on ranges.
repos:
  - repo: https://example.com/hook
    rev: v1
    hooks:
      - id: my-hook
        additional_dependencies:
          - pydantic>=1.0,<3.0
