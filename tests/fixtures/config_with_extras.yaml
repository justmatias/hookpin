# Config with PEP 508 extras (pydantic[email]) and a >= operator (black>=22.0).
# Used to verify that extras notation and non-exact operators are handled and preserved correctly.
repos:
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.0.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic[email]==2.0.0
          - black>=22.0
          - mypy==0.900
